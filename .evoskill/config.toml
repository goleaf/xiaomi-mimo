[harness]
name = "claude"
model = "nvidia/nemotron-3-super-120b-a12b"

[evolution]
mode = "skill_only"
iterations = 20
frontier_size = 3
concurrency = 4
no_improvement_limit = 5

[dataset]
path = "data/laravel_questions.csv"
question_column = "question"
ground_truth_column = "answer"
train_ratio = 0.18
val_ratio = 0.12

[scorer]
type = "multi_tolerance"
